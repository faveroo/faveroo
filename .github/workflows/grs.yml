name: Update README cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=00000000&hide_border=true&theme=transparent&cache_seconds=86400
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&bg_color=00000000&hide_border=true&theme=transparent&cache_seconds=86400
          path: profile/languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git pull --rebase
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
