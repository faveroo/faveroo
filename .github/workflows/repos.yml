name: Update README repo cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        repo:
          - TinyQL
          - FinanceApp
          - CollectionPHP

    steps:
      - uses: actions/checkout@v4

      - name: Create repo cards
        run: |
          mkdir -p profile/repos

          curl -o profile/repos/${{ matrix.repo }}.svg \
          "https://github-readme-stats.vercel.app/api/pin/?username=${{ github.repository_owner }}&repo=${{ matrix.repo }}&theme=transparent&bg_color=00000000&hide_border=true"

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add profile/repos/*.svg

          git commit -m "Update repo cards" || exit 0

          git push
