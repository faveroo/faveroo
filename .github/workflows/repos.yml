name: Update README repo cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        repo:
          - TinyQL
          - fluent-data

    steps:
      - uses: actions/checkout@v4

      - name: Generate repo card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: repo
          options: username=${{ github.repository_owner }}&repo=${{ matrix.repo }}&bg_color=00000000&hide_border=true&theme=transparent&cache_seconds=86400
          path: profile/repos/${{ matrix.repo }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add profile/repos/*.svg

          git commit -m "Update repo cards" || exit 0

          git push
